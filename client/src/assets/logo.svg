<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="background:transparent">
  <defs>
    <!-- Sun Gradient -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF7E40" />
      <stop offset="100%" stop-color="#FFC107" />
    </linearGradient>
    <!-- Sea Wave 1 Gradient -->
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#00838F" />
    </linearGradient>
    <!-- Sea Wave 2 Gradient -->
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00B0FF" />
      <stop offset="100%" stop-color="#01579B" />
    </linearGradient>
    <!-- Circle Clip for internal artwork -->
    <clipPath id="circleClip">
      <circle cx="60" cy="60" r="48" />
    </clipPath>
  </defs>

  <!-- Outer Ring with Dashed Style -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="#FFC107" stroke-width="2" stroke-dasharray="4 3" opacity="0.8" />
  <!-- Inner Ring Solid -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="#FF7E40" stroke-width="1.5" opacity="0.9" />

  <!-- Clip internal elements -->
  <g clip-path="url(#circleClip)">
    <!-- Sky Background -->
    <circle cx="60" cy="60" r="48" fill="#0D0D0D" />
    <!-- Sun -->
    <circle cx="60" cy="62" r="32" fill="url(#sunGrad)" />

    <!-- Minimalist Sailboat Silhouette -->
    <!-- Hull -->
    <path d="M42 74 L78 74 Q74 81 60 81 Q46 81 42 74 Z" fill="#ffffff" opacity="0.95" />
    <!-- Main Sail -->
    <path d="M58 46 L58 71 Q44 71 45 71 Z" fill="#ffffff" opacity="0.9" />
    <!-- Fore Sail -->
    <path d="M61 52 L61 71 Q72 71 70 71 Z" fill="#ffffff" opacity="0.9" />

    <!-- Overlapping stylized sea waves -->
    <!-- Back Wave -->
    <path d="M10 82 Q35 72 60 82 Q85 92 110 82 L110 110 L10 110 Z" fill="url(#wave2)" opacity="0.85" />
    <!-- Front Wave -->
    <path d="M10 92 Q35 102 60 92 Q85 82 110 92 L110 110 L10 110 Z" fill="url(#wave1)" />
  </g>
</svg>
